<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTIMACORE</title>
    <script src="js/api.js?v=3"></script>
    <script>document.title = API_CONFIG.title;</script>
    <link rel="icon" type="image/png" href="img/estimacore.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        :root {
            /* Light theme variables */
            --body-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --brand-primary: #0070ff;
            --input-focus: #0070ff;
        }

        body {
            background-color: var(--body-bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(var(--brand-color-rgb), 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(var(--brand-color-rgb), 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: var(--text-main);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            z-index: 1;
            position: relative;
            padding: 20px;
        }

        .login-header {
            padding: 30px 20px 10px;
            text-align: center;
        }

        .login-header .icon-box img {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        .login-header h4 {
            color: var(--text-main);
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted) !important;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .login-body {
            padding: 20px;
        }

        .form-floating .form-control {
            background-color: #fdfdfd !important;
            border: 1.5px solid #eaeaea !important;
            color: var(--text-main) !important;
            border-radius: 12px !important;
            height: 58px;
            box-shadow: none !important;
            transition: all 0.2s ease;
        }

        .form-floating .form-control:focus {
            border-color: var(--brand-primary) !important;
            background-color: #ffffff !important;
        }

        .form-floating label {
            color: var(--text-muted) !important;
            padding-left: 15px;
        }

        .btn-login {
            background: var(--brand-primary);
            border: none;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border-radius: 12px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(var(--brand-color-rgb), 0.15);
        }

        .btn-login:hover {
            background: var(--brand-color-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(var(--brand-color-rgb), 0.25);
        }

        /* Autofill override */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #ffffff inset !important;
            -webkit-text-fill-color: var(--text-main) !important;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="icon-box">
                <img src="img/estimacore.png" alt="Estimacore Logo">
            </div>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                    <label for="emailInput">Email</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Password" required>
                    <label for="passwordInput">Password</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-login text-white" id="loginButton">
                    LOGIN <i class="fas fa-shield-halved ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js?v=3"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const loginBtn = document.getElementById('loginButton');

            // Basic Loading State
            const originalBtnContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            loginBtn.disabled = true;

            try {
                const response = await fetch(API_CONFIG.endpoints.login, {
                    method: 'POST',
                    credentials: 'include', // 🔥 REQUIRED
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // if (data.user && data.user.role === 'user') {
                    //     await Swal.fire({
                    //         title: 'Access Denied',
                    //         text: 'This dashboard is for HR/Admins only.',
                    //         icon: 'error',
                    //         confirmButtonColor: '#ff003c'
                    //     });
                    //     return;
                    // }
                    // Success! 
                    localStorage.setItem('session_active', 'true');
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Specific Redirect Logic based on Role
                    const role = (data.user && data.user.role) ? data.user.role.toLowerCase() : '';
                    if (role === 'user') {
                        window.location.href = '/invoice_upload';
                    } else {
                        window.location.href = '/list_invoice';
                    }
                } else {
                    // Error
                    await Swal.fire({
                        title: 'Login Failed',
                        text: data.message || 'Please check your credentials.',
                        icon: 'error',
                        confirmButtonColor: 'var(--brand-color)'
                    });
                }

            } catch (error) {
                console.error('Login Error:', error);
                await Swal.fire({
                    title: 'Error',
                    text: 'An error occurred. Please try again later.',
                    icon: 'error',
                    confirmButtonColor: 'var(--brand-color)'
                });
            } finally {
                // Reset Button
                loginBtn.innerHTML = originalBtnContent;
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
