<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice List - Admin Dashboard</title>
    <link rel="icon" type="image/png" href="img/estimacore.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Page Content -->
    <div id="content">
        <!-- Main Content -->
        <div id="main-content" class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>All Invoices List</h2>
            </div>

            <div class="row g-4 mb-5" id="stat-cards-row">
                <!-- 1. Technician Pending -->
                <div class="col-md-6 col-lg-4 col-xl">
                    <div class="card stat-card card-review h-100 p-3 shadow-sm" data-status="technician_pending">
                        <div class="card-body">
                            <div class="stat-icon icon-review">
                                <i class="fas fa-tools"></i>
                            </div>
                            <div class="stat-label">Pending Technician</div>
                            <div class="stat-value" id="stat-technician">0</div>
                        </div>
                    </div>
                </div>

                <!-- 2. Sales Pending -->
                <div class="col-md-6 col-lg-4 col-xl">
                    <div class="card stat-card card-forward h-100 p-3 shadow-sm" data-status="sales_pending">
                        <div class="card-body">
                            <div class="stat-icon icon-forward">
                                <i class="fas fa-shopping-cart"></i>
                            </div>
                            <div class="stat-label">Pending Sales</div>
                            <div class="stat-value" id="stat-sales">0</div>
                        </div>
                    </div>
                </div>

                <!-- 3. Rejected -->
                <div class="col-md-6 col-lg-4 col-xl">
                    <div class="card stat-card card-rejected h-100 p-3 shadow-sm" data-status="rejected">
                        <div class="card-body">
                            <div class="stat-icon icon-rejected">
                                <i class="fas fa-times-circle"></i>
                            </div>
                            <div class="stat-label">Rejected</div>
                            <div class="stat-value" id="stat-rejected">0</div>
                        </div>
                    </div>
                </div>

                <!-- 4. Completed/Approved -->
                <div class="col-md-6 col-lg-4 col-xl">
                    <div class="card stat-card card-accepted h-100 p-3 shadow-sm" data-status="completed">
                        <div class="card-body">
                            <div class="stat-icon icon-accepted">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="stat-label">Completed</div>
                            <div class="stat-value" id="stat-accepted">0</div>
                        </div>
                    </div>
                </div>


                <!-- 6. Total Invoices -->
                <div class="col-md-6 col-lg-4 col-xl">
                    <div class="card stat-card card-total h-100 p-3 shadow-sm" data-status="">
                        <div class="card-body">
                            <div class="stat-icon icon-total">
                                <i class="fas fa-file-invoice-dollar"></i>
                            </div>
                            <div class="stat-label">Total Invoices</div>
                            <div class="stat-value" id="stat-total">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Invoice List Card -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-primary"><i class="fas fa-file-invoice me-2"></i>System Invoices</h5>
                    <!-- <button class="btn btn-sm btn-success">
                        <i class="fas fa-download me-1"></i> Export Excel
                    </button> -->
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="invoicelist-table" class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 50px;">#</th>
                                    <th>Upload Date</th>
                                    <th>Opsi</th>
                                    <th>Dept</th>
                                    <th>Keterangan</th>
                                    <th>User</th>
                                    <th>Amount (IDR)</th>
                                    <th>Status</th>
                                    <th style="width: 80px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="invoicelist-body">
                                <!-- Data populated via DataTables -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="js/api.js?v=3"></script>
    <script src="js/auth.js"></script>
    <script src="js/apiFetch.js"></script>
    <script src="js/layout.js"></script>

    <style>
        .stat-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 2px solid transparent !important;
        }

        .stat-card.active {
            border-color: var(--brand-color) !important;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(var(--brand-color-rgb), 0.2) !important;
        }

        .stat-card.active::after {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 15px;
            color: var(--brand-color);
            font-size: 1.2rem;
        }
    </style>

    <script>
        let currentStatusFilter = '';

        document.addEventListener("DOMContentLoaded", function () {
            // Initialize Layout
            renderLayout('list_invoice');

            const formatCurrency = (data) => new Intl.NumberFormat('id-ID').format(data || 0);

            // Initialize DataTable
            initDataTable('#invoicelist-table', {
                processing: true,
                serverSide: true,
                ajax: async function (data, callback, settings) {
                    const page = (data.start / data.length) + 1;
                    const limit = data.length;
                    const searchTerm = data.search ? data.search.value : '';

                    try {
                        const url = new URL(API_CONFIG.endpoints.invoiceList);
                        url.searchParams.append('page', page);
                        url.searchParams.append('limit', limit);

                        if (searchTerm) {
                            url.searchParams.append('search', searchTerm);
                        }

                        // ✅ ADDED: Status Filter
                        if (currentStatusFilter) {
                            url.searchParams.append('status', currentStatusFilter);
                        }

                        const response = await apiFetch(url.toString(), {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        });

                        if (!response.ok) throw new Error('Failed to fetch invoice list');

                        const result = await response.json();

                        callback({
                            draw: data.draw,
                            recordsTotal: result.totalItems || (Array.isArray(result) ? result.length : 0),
                            recordsFiltered: result.totalItems || (Array.isArray(result) ? result.length : 0),
                            data: Array.isArray(result) ? result : (Array.isArray(result.invoices) ? result.invoices : [])
                        });
                    } catch (error) {
                        console.error('Error fetching data:', error);
                        callback({
                            draw: data.draw,
                            recordsTotal: 0,
                            recordsFiltered: 0,
                            data: []
                        });
                    }
                },
                columns: [
                    {
                        data: null,
                        render: (data, type, row, meta) => meta.row + 1 + meta.settings._iDisplayStart,
                        orderable: false
                    },
                    {
                        data: 'tanggal_upload',
                        render: (data) => {
                            if (!data) return '-';
                            const date = new Date(data);
                            return date.toLocaleDateString('en-GB', {
                                day: '2-digit',
                                month: 'short',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        }
                    },
                    {
                        data: 'opsi',
                        render: (data) => data || '-'
                    },
                    {
                        data: 'dept',
                        render: (data) => data || '-'
                    },
                    {
                        data: 'keterangan',
                        render: (data) => data || '-'
                    },
                    {
                        data: 'user',
                        render: (user) => {
                            if (!user) return '-';
                            return `
    <div>
        <div class="fw-bold text-dark">${user.name || '-'}</div>
        <div class="text-muted small">${user.email || '-'}</div>
    </div>
    `;
                        }
                    },
                    {
                        data: 'total_harga',
                        className: 'text-end fw-bold',
                        render: (data) => `Rp ${formatCurrency(data)}`
                    },
                    {
                        data: 'status',
                        render: (data) => {
                            const badges = {
                                on_review: 'warning',
                                accepted: 'success',
                                completed: 'success',
                                rejected: 'danger',
                                on_forward: 'info',
                                closed: 'info'
                            };
                            const statusLabels = {
                                on_forward: 'Verified',
                                accepted: 'Approved',
                                completed: 'Completed'
                            };
                            const color = badges[data] || 'secondary';
                            const label = statusLabels[data] || data || '-';
                            return `<span class="badge bg-${color}">${label}</span>`;
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        render: (data, type, row) => `
    <div class="text-center">
        <button class="btn btn-sm btn-outline-primary" onclick="viewInvoice(${row.id})" title="View Invoice">
            <i class="fas fa-eye"></i>
        </button>
    </div>
    `
                    }
                ],
                order: [[1, 'desc']]
            });

            // ✅ FIXED: Call fetchSummary on page load
            fetchSummary();

            // ✅ ADDED: Card Click Interaction
            const cards = document.querySelectorAll('.stat-card');
            cards.forEach(card => {
                card.addEventListener('click', function () {
                    const status = this.getAttribute('data-status');

                    // Set filter
                    currentStatusFilter = status;

                    // Update UI Active State
                    cards.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');

                    // Reload table
                    $('#invoicelist-table').DataTable().ajax.reload();
                });
            });

            // Set "Total Invoices" as active by default
            document.querySelector('.stat-card[data-status=""]').classList.add('active');
        });

        function viewInvoice(id) {
            window.location.href = `/invoice_detail?id=${id}`;
        }

        async function fetchSummary() {
            try {
                const response = await apiFetch(API_CONFIG.endpoints.dashboardInvoice, {
                    credentials: 'include'
                });

                if (!response.ok) throw new Error('Failed to fetch summary');

                const data = await response.json();

                // ✅ FIXED: Directly set values, no animation
                document.getElementById('stat-technician').innerText = data.technician_pending || 0;
                document.getElementById('stat-sales').innerText = data.sales_pending || 0;
                document.getElementById('stat-rejected').innerText = data.rejected || 0;
                document.getElementById('stat-accepted').innerText = data.completed || 0;
                document.getElementById('stat-total').innerText = data.total || 0;

            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                showToast('Failed to load summary details', 'error');
            }
        }
    </script>
</body>

</html>
