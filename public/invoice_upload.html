<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Upload - Admin Dashboard</title>
    <link rel="icon" type="image/png" href="img/estimacore.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Page Content -->
    <div id="content">
        <!-- Main Content -->
        <div id="main-content" class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Invoice Upload</h2>
            </div>

            <!-- Main Content Row -->
            <div class="row justify-content-center">
                <!-- Center Column: Upload Form -->
                <div class="col-md-6">
                    <div class="card mb-4 border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 text-primary"><i class="fas fa-file-upload me-2"></i>Upload Invoice Image
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="upload-form">
                                <div class="mb-3">
                                    <label for="invoiceImage" class="form-label">Select Invoice Image</label>
                                    <input class="form-control" type="file" id="invoiceImage" accept="image/*" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="opsi" class="form-label">Pilih Flow</label>
                                        <select class="form-select" id="opsi" required>
                                            <option value="" selected disabled>Select Flow</option>
                                            <option value="sales">Sales</option>
                                            <option value="technician">Technician</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="keterangan" class="form-label">Keterangan</label>
                                        <input type="text" class="form-control" id="keterangan"
                                            placeholder="Masukkan keterangan..." required>
                                    </div>
                                    <div class="col-md-6 mb-3 d-none">
                                        <label for="dept" class="form-label">Department</label>
                                        <select class="form-select" id="dept" required>
                                            <option value="" disabled>Select Department</option>
                                            <option value="engineering" selected>Engineering</option>
                                            <option value="suply_chain">Supply Chain</option>
                                            <option value="general_affairs">General Affairs</option>
                                            <option value="human_resources">Human Resources</option>
                                            <option value="operations">Operations</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-3 text-center bg-light p-3 rounded"
                                    style="min-height: 200px; display: flex; align-items: center; justify-content: center;">
                                    <span id="preview-placeholder" class="text-muted">Image Preview</span>
                                    <img id="image-preview" src="#" alt="Image Preview"
                                        class="img-fluid d-none border rounded" style="max-height: 300px;">
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary" id="btn-submit-upload">
                                        <i class="fas fa-magic me-2"></i>Upload
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="row justify-content-center mt-4">
                    <div class="col-md-11">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                                <h5 class="mb-0 text-primary"><i class="fas fa-history me-2"></i>Recent Uploads</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle w-100" id="invoice-list-table">
                                        <thead class="table-light">
                                            <tr>
                                                <th style="width: 150px;">Upload Date</th>
                                                <th>Opsi</th>
                                                <th>Dept</th>
                                                <th>Keterangan</th>
                                                <th>Status</th>
                                                <th>Amount (IDR)</th>
                                                <th class="text-center" style="width: 80px;">Preview</th>
                                            </tr>
                                        </thead>
                                        <tbody id="invoice-list-tbody">
                                            <tr>
                                                <td colspan="5" class="text-center py-4">Loading your invoices...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core JS -->
        <script src="js/api.js?v=3"></script>
        <script src="js/auth.js"></script>
        <script src="js/apiFetch.js"></script>
        <script src="js/layout.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // Initialize Layout
                renderLayout('invoice_upload');

                // Initial cleanup
                resetPage();
                checkGroupRestriction();

                function resetPage() {
                    const form = document.getElementById('upload-form');
                    if (form) form.reset();
                    const previewImg = document.getElementById('image-preview');
                    const placeholder = document.getElementById('preview-placeholder');
                    if (previewImg) previewImg.classList.add('d-none');
                    if (placeholder) placeholder.classList.remove('d-none');
                }

                async function checkGroupRestriction() {
                    try {
                        const res = await apiFetch(API_CONFIG.endpoints.apiUsage);
                        if (!res.ok) return;

                        const data = await res.json();
                        if (!data.hasGroup || (data.usage >= data.limit)) {
                            const btn = document.getElementById('btn-submit-upload');
                            const fileInput = document.getElementById('invoiceImage');
                            const form = document.getElementById('upload-form');

                            // Disable inputs
                            if (btn) {
                                btn.disabled = true;
                                btn.innerHTML = '<i class="fas fa-lock me-2"></i>Upload Disabled';
                                btn.classList.replace('btn-primary', 'btn-secondary');
                            }
                            if (fileInput) fileInput.disabled = true;

                            // Add warning message
                            const isLimitReached = data.hasGroup && data.usage >= data.limit;
                            const alertType = isLimitReached ? 'danger' : 'warning';
                            const alertTitle = isLimitReached ? 'Limit Reached' : 'Access Restricted';
                            const alertMsg = isLimitReached
                                ? `Your group API usage has reached the limit (${data.usage}/${data.limit}).`
                                : (data.message || "You don't belong to any API group yet. Uploading is disabled.");

                            form.insertAdjacentHTML('beforebegin', `
                                <div class="alert alert-${alertType} border-0 shadow-sm mb-4">
                                    <i class="fas fa-exclamation-triangle me-2"></i>
                                    <strong>${alertTitle}:</strong> ${alertMsg}
                                </div>
                            `);
                        }
                    } catch (e) {
                        console.error('Error checking group restriction:', e);
                    }
                }

                // Initialize DataTable
                const invoiceTable = initDataTable('#invoice-list-table', {
                    processing: true,
                    serverSide: true,
                    pageLength: 5,
                    lengthMenu: [5, 10, 25],
                    ajax: async function (data, callback, settings) {
                        const page = (data.start / data.length) + 1;
                        const limit = data.length;
                        const searchTerm = data.search ? data.search.value : '';

                        try {
                            const url = new URL(API_CONFIG.endpoints.invoiceList);
                            url.searchParams.append('page', page);
                            url.searchParams.append('limit', limit);
                            if (searchTerm) url.searchParams.append('search', searchTerm);

                            const response = await apiFetch(url.toString(), { credentials: 'include' });
                            if (!response.ok) throw new Error('Failed to fetch invoice list');

                            const result = await response.json();
                            const invoices = Array.isArray(result) ? result : (result.invoices || []);

                            callback({
                                draw: data.draw,
                                recordsTotal: result.totalItems || invoices.length,
                                recordsFiltered: result.totalItems || invoices.length,
                                data: invoices
                            });
                        } catch (error) {
                            console.error('Error fetching data:', error);
                            callback({ draw: data.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
                        }
                    },
                    columns: [
                        {
                            data: 'tanggal_upload',
                            render: (data) => {
                                if (!data) return '-';
                                return new Date(data).toLocaleDateString('en-GB', {
                                    day: '2-digit', month: 'short', year: 'numeric',
                                    hour: '2-digit', minute: '2-digit'
                                });
                            }
                        },
                        { data: 'opsi', render: (data) => data || '-' },
                        { data: 'dept', render: (data) => data || '-' },
                        { data: 'keterangan', render: (data) => data || '-' },
                        {
                            data: 'status',
                            render: (data) => {
                                const badges = { on_review: 'warning', approved: 'success', rejected: 'danger', on_forward: 'info', closed: 'info' };
                                return `<span class="badge bg-${badges[data] || 'secondary'}">${data || '-'}</span>`;
                            }
                        },
                        {
                            data: 'total_harga',
                            render: (data) => `Rp ${parseFloat(data || 0).toLocaleString('id-ID')}`
                        },
                        {
                            data: 'nama_invoice',
                            className: 'text-center',
                            orderable: false,
                            render: (data, type, row) => {
                                if (!data) return '<i class="fas fa-image text-muted"></i>';
                                return `
                                    <div style="width: 40px; height: 40px; overflow: hidden; border-radius: 4px; margin: 0 auto;">
                                        <img src="" data-filename="${data}" alt="Invoice" class="invoice-mini-pic" 
                                            style="width: 100%; height: 100%; object-fit: cover; cursor: pointer;" 
                                            onclick="window.location.href='/invoice_detail?id=${row.id}'">
                                    </div>`;
                            }
                        }
                    ],
                    order: [[0, 'desc']],
                    drawCallback: function () {
                        // Fetch images securely after table draw
                        document.querySelectorAll('.invoice-mini-pic').forEach(img => {
                            // Only fetch if not already loaded (check for blob URL)
                            if (img.src.startsWith('blob:')) return;

                            const filename = img.getAttribute('data-filename');
                            if (!filename) return;

                            apiFetch(`${API_CONFIG.endpoints.invoiceDetailImage}/${filename}`, { credentials: 'include' })
                                .then(res => res.blob())
                                .then(blob => {
                                    const url = URL.createObjectURL(blob);
                                    img.src = url;
                                })
                                .catch(e => console.error('Error loading mini image', e));
                        });
                    }
                });

                // Image Preview
                const fileInput = document.getElementById('invoiceImage');
                const previewImg = document.getElementById('image-preview');
                const placeholder = document.getElementById('preview-placeholder');

                fileInput.addEventListener('change', function () {
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = e => {
                            previewImg.src = e.target.result;
                            previewImg.classList.remove('d-none');
                            placeholder.classList.add('d-none');
                        };
                        reader.readAsDataURL(file);
                    }
                });

                // Process AI
                document.getElementById('upload-form').addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const btn = document.getElementById('btn-submit-upload');
                    const file = fileInput.files[0];
                    if (!file) return;

                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Analyzing...';

                    // ✅ ADDED: Pre-check session to ensure token is fresh before starting upload
                    // This prevents expiry during the upload itself.
                    try {
                        await Auth.checkSession();
                    } catch (e) {
                        console.warn('Session check failed before upload', e);
                    }

                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('opsi', document.getElementById('opsi').value);
                    formData.append('keterangan', document.getElementById('keterangan').value);
                    formData.append('dept', document.getElementById('dept').value);

                    // Include user info
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    if (user.name) formData.append('name', user.name);
                    if (user.email) formData.append('email', user.email);

                    try {
                        console.log('Sending to n8n URL:', N8N_URL_INVOICE);
                        const res = await fetch(N8N_URL_INVOICE, {
                            method: 'POST',
                            body: formData
                        });

                        if (res.ok) {
                            const data = await res.json();
                            console.log('AI Process success:', data);

                            // 🔥 Increment API Usage
                            try {
                                const user = JSON.parse(localStorage.getItem('user') || '{}');
                                if (user.id) {
                                    console.log('Triggering API usage increment for userId:', user.id);
                                    const usageRes = await apiFetch(API_CONFIG.endpoints.incrementAPIUsage(user.id), {
                                        method: 'POST',
                                        credentials: 'include'
                                    });

                                    if (!usageRes.ok) {
                                        const errorData = await usageRes.json();
                                        console.error('API usage increment failed:', errorData);
                                        if (usageRes.status === 403) {
                                            await showAlert('Limit Reached', errorData.message || 'API usage limit reached.', 'error');
                                            window.location.reload(); // Refresh to lock UI
                                            return;
                                        }
                                    } else {
                                        console.log('API usage incremented successfully');
                                    }
                                } else {
                                    console.warn('User ID not found in session, skipping usage increment.');
                                }

                                // Refresh Sidebar Box
                                if (window.updateAPIUsageBox) {
                                    console.log('Refreshing sidebar usage box...');
                                    await updateAPIUsageBox();
                                }
                            } catch (usageErr) {
                                console.error('Failed to increment API usage:', usageErr);
                            }

                            await showAlert('Success', 'Invoice processed successfully.', 'success');
                            resetPage();
                            // Reload DataTable
                            $('#invoice-list-table').DataTable().ajax.reload();
                        } else {
                            const errorText = await res.text();
                            console.error('n8n error response:', res.status, errorText);
                            throw new Error(`Server returned ${res.status}: ${errorText || 'No detail'}`);
                        }
                    } catch (err) {
                        console.error('Fetch error:', err);
                        showAlert('Connection Error', `Failed to Upload: ${err.message}`, 'error');
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-magic me-2"></i>Upload';
                    }
                });
            });
        </script>
</body>

</html>
