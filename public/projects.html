<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="icon" type="image/png" href="img/estimacore.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .card-clean {
            background: #fff;
            border: 1px solid #e9edf3;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 14px;
        }

        .project-row td,
        .project-row th {
            font-size: 0.85rem;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>
    <div id="content">
        <div id="main-content" class="container-fluid p-4">
            <div class="mb-4">
                <h2 class="mb-1">Projects</h2>
                <p class="text-muted mb-0">Create new project quickly.</p>
            </div>

            <div class="card-clean p-4 mb-4">
                <div class="section-title"><i class="fas fa-plus-circle me-2 text-primary"></i>Create Project</div>
                <form id="project-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Project Name</label>
                        <input id="project-name" type="text" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Client</label>
                        <input id="project-client" type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input id="project-date" type="date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Budget</label>
                        <input id="project-budget" type="number" min="0" class="form-control" placeholder="0" required>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button id="btn-save-project" type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Save Project
                        </button>
                        <button type="reset" class="btn btn-outline-secondary">Reset</button>
                    </div>
                </form>
            </div>

            <div class="card-clean p-4">
                <div class="section-title"><i class="fas fa-list me-2 text-primary"></i>Project List</div>
                <div class="table-responsive">
                    <table class="table table-hover project-row mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Project</th>
                                <th>Client</th>
                                <th>Start Date</th>
                                <th>Budget</th>
                            </tr>
                        </thead>
                        <tbody id="project-tbody">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">Loading projects...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/auth.js"></script>
    <script src="js/apiFetch.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const form = document.getElementById("project-form");
        const tbody = document.getElementById("project-tbody");
        const saveButton = document.getElementById("btn-save-project");

        document.addEventListener("DOMContentLoaded", async () => {
            renderLayout("projects");
            await loadProjects();
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                name: document.getElementById("project-name").value.trim(),
                client: document.getElementById("project-client").value.trim(),
                start_date: document.getElementById("project-date").value,
                budget: Number(document.getElementById("project-budget").value || 0),
                status: "active"
            };

            if (!payload.name || !payload.client || !payload.start_date) {
                showToast("Please fill all required fields", "error");
                return;
            }

            saveButton.disabled = true;
            saveButton.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Saving...';

            try {
                const response = await apiFetch(API_CONFIG.endpoints.projects, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({}));
                    throw new Error(errorBody.message || "Failed to create project");
                }

                form.reset();
                showToast("Project created", "success");
                await loadProjects();
            } catch (error) {
                console.error(error);
                showToast(error.message || "Failed to create project", "error");
            } finally {
                saveButton.disabled = false;
                saveButton.innerHTML = '<i class="fas fa-save me-1"></i> Save Project';
            }
        });

        async function loadProjects() {
            try {
                const response = await apiFetch(API_CONFIG.endpoints.projects);
                if (!response.ok) throw new Error("Failed to load projects");

                const projects = await response.json();
                if (!Array.isArray(projects) || projects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No project yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = projects.map((project, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="fw-semibold">${escapeHtml(project.project_name || "-")}</td>
                        <td>${escapeHtml(project.client || "-")}</td>
                        <td>${formatDate(project.start_date)}</td>
                        <td>${formatCurrency(project.budget)}</td>
                    </tr>
                `).join("");
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">Failed to load projects.</td></tr>';
            }
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "-";
            return date.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
        }

        function formatCurrency(value) {
            const number = Number(value || 0);
            return "Rp " + new Intl.NumberFormat("id-ID").format(number);
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
    </script>
</body>

</html>
